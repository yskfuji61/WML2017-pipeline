# Full WMH2017 MONAI 3D U-Net — Phase A3 augmentation + sampling experiment
run:
  run_id: wmh2017_exp_a3_aug_pos3_seed42
  seed: 42
  device: auto
  output_dir: artifacts/runs/wmh2017_exp_a3_aug_pos3_seed42
  run_manifest: registry/runs/run_manifest.csv

data:
  dataset_manifest: reports/dataset_manifest.csv
  split_manifest: data/splits/wmh2017_train_val_seed42.csv
  image_key: flair_pre_path
  label_key: wmh_path
  patch_size: [96, 96, 96]
  cache_rate: 0.5
  num_workers: 2
  val_max_cases: 0

model:
  name: monai_unet
  spatial_dims: 3
  in_channels: 1
  out_channels: 2
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

training:
  mode: full
  max_epochs: 50
  early_stopping_patience: 10
  learning_rate: 0.0001
  threshold: 0.5
  use_amp: true
  save_checkpoint: true
  save_predictions: true
  save_best_only: true
  loss:
    name: tversky_focal
    alpha: 0.3
    beta: 0.7
    gamma: 1.33
  sampling:
    pos: 3
    neg: 1
    num_samples: 2
  augmentation:
    random_flip_prob: 0.5
    random_affine_prob: 0.3
    random_intensity_shift_prob: 0.3
