# WMH2017 recall redesign - RC2 (Tversky beta=0.85 + pos=2), fold 3
# Local validation only; not SOTA/official/clinical/production.
run:
  run_id: wmh2017_rc2_cosine_fold3_seed42
  seed: 42
  device: auto
  output_dir: artifacts/runs/wmh2017_rc2_cosine_fold3_seed42
  run_manifest: registry/runs/run_manifest.csv

data:
  dataset_manifest: reports/dataset_manifest.csv
  split_manifest: data/splits/wmh2017_kfold_seed42/fold3.csv
  use_configured_split: true
  image_key: flair_pre_path
  label_key: wmh_path
  patch_size: [96, 96, 96]
  cache_rate: 0.5
  num_workers: 2
  val_max_cases: 0

model:
  name: monai_unet
  spatial_dims: 3
  in_channels: 1
  out_channels: 2
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

training:
  mode: full
  max_epochs: 100
  early_stopping_patience: 20
  learning_rate: 0.0001
  threshold: 0.5
  use_amp: true
  save_checkpoint: true
  save_predictions: true
  save_best_only: true
  selection_metric: mean_dice
  selection_mode: max
  selection_tie_breakers:
    - mean_lesion_recall
    - mean_lesion_f1
  checkpoint_prefix: model_best
  lr_scheduler:
    name: cosine
    eta_min: 0.000001
  loss:
    name: tversky_focal
    alpha: 0.15
    beta: 0.85
    gamma: 1.33
  sampling:
    pos: 2
    neg: 1
    num_samples: 2
