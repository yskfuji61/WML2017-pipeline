# Full WMH2017 MONAI 3D U-Net training config (efficiency path; not smoke)
run:
  run_id: wmh2017_monai_unet3d_full_seed42
  seed: 42
  device: auto
  output_dir: artifacts/runs/wmh2017_monai_unet3d_full_seed42
  run_manifest: registry/runs/run_manifest.csv

data:
  dataset_manifest: reports/dataset_manifest.csv
  split_manifest: data/splits/wmh2017_train_val_seed42.csv
  image_key: flair_pre_path
  label_key: wmh_path
  patch_size: [96, 96, 96]
  cache_rate: 0.5
  num_workers: 2
  val_max_cases: 0

model:
  name: monai_unet
  spatial_dims: 3
  in_channels: 1
  out_channels: 2
  channels: [16, 32, 64, 128]
  strides: [2, 2, 2]
  num_res_units: 2

training:
  mode: full
  max_epochs: 50
  early_stopping_patience: 10
  learning_rate: 0.0001
  threshold: 0.5
  use_amp: true  # effective on CUDA only; MPS keeps float32 for accuracy
  save_checkpoint: true
  save_predictions: true
  save_best_only: true
  # Checkpoint selection semantics (see docs/adr/ADR-0007).
  # selection_metric drives which validation snapshot is kept as best; default
  # mean_dice preserves prior behavior. This is local validation only; not SOTA,
  # not official benchmark, not clinical, not production.
  selection_metric: mean_dice          # mean_dice | mean_lesion_recall | mean_lesion_f1 | composite_dice_recall
  selection_mode: max                  # max for dice/recall/f1/composite; min for loss proxies
  selection_min_delta: 0.0
  selection_tie_breakers:
    - mean_lesion_recall
    - mean_lesion_f1
  composite_weights:
    mean_dice: 0.7
    mean_lesion_recall: 0.3
  checkpoint_prefix: model_best
