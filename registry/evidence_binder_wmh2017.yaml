binder_id: WMH2017_EVIDENCE_BINDER
package_id: WMH2017-LOCAL-POC-SCAFFOLD
package_version: 0.2.3
target_state: READY_FOR_PREVIEW
binder_status: OPEN
run_id: null
required_sections:
  package_identity:
    required: true
    artifacts:
      - registry/package_identity_wmh2017.yaml
      - reports/full_package_manifest.json
  real_run:
    required_for:
      - READY_FOR_PREVIEW
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    artifacts:
      - artifacts/runs/{run_id}/run_context.json
      - artifacts/runs/{run_id}/runtime_fingerprint.json
      - artifacts/runs/{run_id}/command_log.jsonl
      - artifacts/runs/{run_id}/dataset/dataset_manifest.json
      - artifacts/runs/{run_id}/label_audit/label_audit.json
      - artifacts/runs/{run_id}/splits/split_manifest.json
      - artifacts/runs/{run_id}/configs/train_config.materialized.yaml
      - artifacts/runs/{run_id}/logs/train_log.jsonl
      - artifacts/runs/{run_id}/checkpoints/model.pt.sha256
      - artifacts/runs/{run_id}/predictions/prediction_manifest.csv
      - artifacts/runs/{run_id}/evaluation/case_metrics.csv
      - artifacts/runs/{run_id}/evaluation/metrics_summary.json
      - artifacts/runs/{run_id}/artifact_manifest.json
  lineage:
    required_for:
      - READY_FOR_PREVIEW
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    artifacts:
      - artifacts/runs/{run_id}/lineage/lineage_graph.json
  security:
    required_for:
      - READY_FOR_PREVIEW
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    fail_closed: true
    artifacts:
      - reports/security/detect_secrets.json
      - reports/security/bandit.json
      - reports/security/pip_audit.json
      - reports/security/sbom.cdx.json
      - reports/security/security_policy_result.json
  review_approval:
    required_for:
      - READY_FOR_PREVIEW
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    artifacts:
      - registry/review_approval_register_wmh2017.csv
  release_decision:
    required_for:
      - READY_FOR_PREVIEW
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    artifacts:
      - docs/release_decisions/release_decision_{run_id}.yaml
  rollback:
    required_for:
      - READY_FOR_LIMITED_INTERNAL_USE
      - READY_FOR_RELEASE
    artifacts:
      - reports/rollback/rollback_rehearsal_bad_config.json
      - reports/rollback/rollback_rehearsal_wrong_threshold.json
      - reports/rollback/rollback_rehearsal_dependency_regression.json
      - reports/rollback/rollback_rehearsal_artifact_hash_mismatch.json
      - reports/rollback/rollback_rehearsal_split_contamination.json
  official_metric_parity:
    required_for:
      - READY_FOR_PREVIEW
    artifacts:
      - reports/evaluation/official_metric_parity_report.json
closure_rule: every Sev1 is either closed with evidence or release claim is reduced
