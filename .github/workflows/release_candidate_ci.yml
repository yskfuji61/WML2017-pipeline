name: release-candidate-ci

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      release_state:
        required: false
        default: PREVIEW_CANDIDATE
        type: string

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    environment: preview-candidate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test,medical-image]"
      - name: Structural gates
        run: make lint typecheck test
      - name: Security scans
        run: make security RUN_ID=${{ inputs.run_id }}
      - name: E2E (requires WMH2017_ROOT secret)
        if: env.WMH2017_ROOT != ''
        env:
          WMH2017_ROOT: ${{ secrets.WMH2017_ROOT }}
        run: make e2e RUN_ID=${{ inputs.run_id }} WMH2017_ROOT="$WMH2017_ROOT"
      - name: Verify release package
        if: env.WMH2017_ROOT != ''
        env:
          WMH2017_ROOT: ${{ secrets.WMH2017_ROOT }}
        run: make verify-package RUN_ID=${{ inputs.run_id }}
      - name: Upload run artifacts
        if: env.WMH2017_ROOT != ''
        uses: actions/upload-artifact@v4
        with:
          name: wmh2017-run-${{ inputs.run_id }}
          path: artifacts/runs/${{ inputs.run_id }}
