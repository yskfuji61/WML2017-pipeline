name: release-candidate-ci

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      target_state:
        required: false
        default: READY_FOR_PREVIEW
        type: string

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    environment: preview-candidate
    steps:
      - uses: actions/checkout@b4ffde65f46336ab88eb683be4bdff4116d1812d # v4.2.2
      - uses: actions/setup-python@0a5c6159137363b2f2ceefdb6592affe52c45527 # v5.4.0
        with:
          python-version: "3.11"
      - name: Require WMH2017_ROOT secret
        env:
          WMH2017_ROOT: ${{ secrets.WMH2017_ROOT }}
        run: test -n "$WMH2017_ROOT"
      - name: Install locked environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test,medical-image]"
      - name: Static gates
        run: |
          make lint
          make typecheck
          make test
          python scripts/verify_no_raw_data_committed.py
          python scripts/verify_no_legacy_imports.py
          python scripts/verify_package_identity.py
          python scripts/verify_finding_register.py --target-state ${{ inputs.target_state }}
          make manifest
      - name: Security gates
        run: make security RUN_ID=${{ inputs.run_id }}
      - name: Rollback rehearsal
        run: |
          make rollback-rehearsal
          python scripts/verify_rollback_rehearsal.py --target-state ${{ inputs.target_state }}
      - name: Official parity report
        run: |
          make parity-report
          python scripts/verify_official_metric_parity.py
      - name: E2E run
        env:
          WMH2017_ROOT: ${{ secrets.WMH2017_ROOT }}
        run: make e2e RUN_ID=${{ inputs.run_id }} WMH2017_ROOT="$WMH2017_ROOT"
      - name: Validate metrics
        run: python scripts/validate_metric_table.py artifacts/runs/${{ inputs.run_id }}/evaluation/case_metrics.csv
      - name: Verify lineage
        run: |
          python scripts/verify_lineage_graph.py \
            --run-id ${{ inputs.run_id }} \
            --require-artifact-hashes \
            --require-source-review \
            --require-release-decision
      - name: Verify review approval
        run: python scripts/verify_review_approval.py --target-state ${{ inputs.target_state }} --run-id ${{ inputs.run_id }}
      - name: Verify evidence binder
        run: |
          python scripts/verify_evidence_binder.py \
            --run-id ${{ inputs.run_id }} \
            --target-state ${{ inputs.target_state }}
      - name: Verify release package
        run: make verify-package RUN_ID=${{ inputs.run_id }}
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: wmh2017-release-evidence-${{ inputs.run_id }}
          path: |
            artifacts/runs/${{ inputs.run_id }}
            reports/security
            reports/ci
            reports/rollback
            reports/evaluation
            reports/full_package_manifest.json
            docs/release_decision_record.md
            registry
