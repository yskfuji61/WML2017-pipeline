name: release-candidate-ci

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      target_state:
        required: false
        default: READY_FOR_PREVIEW
        type: string

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    environment: preview-candidate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install locked environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test,medical-image]"
      - name: Static gates
        run: |
          make lint
          make typecheck
          make test
          python scripts/verify_no_raw_data_committed.py
          python scripts/verify_no_legacy_imports.py
      - name: Security gates
        run: make security RUN_ID=${{ inputs.run_id }}
      - name: Generate SBOM
        run: make sbom
      - name: Rollback rehearsal
        run: python scripts/run_rollback_rehearsal.py --all-scenarios
      - name: E2E run
        env:
          WMH2017_ROOT: ${{ secrets.WMH2017_ROOT }}
        run: |
          test -n "$WMH2017_ROOT"
          make e2e RUN_ID=${{ inputs.run_id }} WMH2017_ROOT="$WMH2017_ROOT"
      - name: Verify lineage
        run: python scripts/verify_lineage_graph.py --run-id ${{ inputs.run_id }} --require-artifact-hashes
      - name: Verify evidence binder
        run: |
          python scripts/verify_evidence_binder.py \
            --run-id ${{ inputs.run_id }} \
            --target-state ${{ inputs.target_state }}
      - name: Verify review approval
        run: |
          python scripts/verify_review_approval.py --target-state ${{ inputs.target_state }} || true
      - name: Verify official metric parity
        run: python scripts/verify_official_metric_parity.py
      - name: Verify release package
        run: make verify-package RUN_ID=${{ inputs.run_id }}
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: wmh2017-release-evidence-${{ inputs.run_id }}
          path: |
            artifacts/runs/${{ inputs.run_id }}
            reports/security
            reports/ci
            reports/rollback
            registry
