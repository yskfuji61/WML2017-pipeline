name: evidence-binder-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  evidence-binder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test]"
      - name: Verify release evidence register
        run: python scripts/verify_release_evidence_register.py --structure-only --run-id wmh2017_preview_20260618_e48ed25
      - name: Verify evidence binder structure
        run: |
          python scripts/verify_evidence_binder.py \
            --run-id wmh2017_preview_20260618_e48ed25 \
            --target-state READY_FOR_PREVIEW \
            --structure-only \
            --skip-delegated
