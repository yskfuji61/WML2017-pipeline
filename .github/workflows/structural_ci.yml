name: structural-ci

on:
  push:
  pull_request:

jobs:
  structural:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test]"
      - name: Lint
        run: ruff check src scripts tests
      - name: Typecheck
        run: mypy src scripts
      - name: Tests
        run: pytest -q tests/unit tests/integration tests/schema tests/contract tests/architecture tests/smoke tests/evaluation
      - name: Architecture gates
        run: |
          python scripts/verify_no_raw_data_committed.py
          python scripts/verify_no_legacy_imports.py
      - name: Verify structural release package
        run: |
          mkdir -p reports/ci
          python scripts/verify_release_package.py \
            --repo-root . \
            --structural-only \
            --out reports/ci/structural_release_manifest.json \
            --package-id WMH2017-LOCAL-POC-SCAFFOLD-0.0.0.0 \
            --package-version 0.0.0.0
      - name: Upload structural reports
        uses: actions/upload-artifact@v4
        with:
          name: structural-reports
          path: reports/ci/
