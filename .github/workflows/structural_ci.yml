name: structural-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  structural:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@b4ffde65f46336ab88eb683be4bdff4116d1812d # v4.2.2
      - uses: actions/setup-python@0a5c6159137363b2f2ceefdb6592affe52c45527 # v5.4.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test]"
      - name: Lint
        run: |
          ruff check src scripts tests
          ruff format --check src scripts tests
      - name: Typecheck
        run: mypy src scripts
      - name: Tests
        run: pytest -q tests/unit tests/integration tests/schema tests/contract tests/architecture tests/smoke tests/evaluation tests/security tests/supply_chain
      - name: Architecture gates
        run: |
          python scripts/verify_no_raw_data_committed.py
          python scripts/verify_no_legacy_imports.py
      - name: Generate structural manifest
        run: |
          mkdir -p reports/ci
          python scripts/verify_release_package.py \
            --repo-root . \
            --structural-only \
            --out reports/full_package_manifest.json \
            --package-id WMH2017-LOCAL-POC-SCAFFOLD \
            --package-version 0.2.3
      - name: Package identity gate
        run: python scripts/verify_package_identity.py
      - name: Finding register gate
        run: python scripts/verify_finding_register.py --target-state READY_FOR_STRUCTURAL_REVIEW
      - name: Verify structural release package copy
        run: |
          python scripts/verify_release_package.py \
            --repo-root . \
            --structural-only \
            --out reports/ci/structural_release_manifest.json \
            --package-id WMH2017-LOCAL-POC-SCAFFOLD \
            --package-version 0.2.3
      - name: Upload structural reports
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: structural-reports
          path: |
            reports/ci/
            reports/full_package_manifest.json
