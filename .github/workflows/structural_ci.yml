name: structural-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  structural:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e ".[dev,test]"
      - name: Lint
        run: |
          ruff check src scripts tests
          ruff format --check src scripts tests
      - name: Typecheck
        run: mypy src scripts
      - name: Tests
        run: pytest -q tests/unit tests/integration tests/schema tests/contract tests/architecture tests/smoke tests/evaluation tests/security tests/supply_chain
      - name: Architecture gates
        run: |
          python scripts/security/verify_no_raw_data_committed.py .
          python scripts/security/verify_no_overclaim.py .
          python scripts/security/verify_no_env_secrets.py .
          python scripts/security/verify_no_unapproved_remote_uri.py .
          python scripts/verify_no_legacy_imports.py
      - name: Manager report claim gate
        run: |
          python scripts/reporting/generate_biweekly_report.py \
            --period-start 2026-06-16 --period-end 2026-06-30 \
            --output reports/biweekly/2026-06-30_report.md
          python scripts/reporting/verify_manager_report_claims.py \
            --report reports/biweekly/2026-06-30_report.md
      - name: Metric formula lock
        run: python scripts/validation/verify_metric_formula_lock.py --spec docs/model_validation/metric_formula_spec.md
      - name: Register validation
        run: python scripts/validate_registers.py
      - name: Record CI URL
        if: success()
        run: python scripts/release/update_latest_green_ci.py
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SHA: ${{ github.sha }}
      - name: Generate structural manifest
        run: |
          mkdir -p reports/ci
          python scripts/verify_release_package.py \
            --repo-root . \
            --structural-only \
            --out reports/full_package_manifest.json \
            --package-id WMH2017-LOCAL-POC-SCAFFOLD \
            --package-version 0.2.3
      - name: Package identity gate
        run: python scripts/verify_package_identity.py
      - name: Finding register gate
        run: python scripts/verify_finding_register.py --target-state READY_FOR_STRUCTURAL_REVIEW
      - name: Verify structural release package copy
        run: |
          python scripts/verify_release_package.py \
            --repo-root . \
            --structural-only \
            --out reports/ci/structural_release_manifest.json \
            --package-id WMH2017-LOCAL-POC-SCAFFOLD \
            --package-version 0.2.3
      - name: Upload structural reports
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: structural-reports
          path: |
            reports/ci/
            reports/full_package_manifest.json
