name: structural-ci

on:
  push:
  pull_request:

jobs:
  unit-and-structural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.4 pandas==2.2.2 scipy==1.13.1 PyYAML==6.0.2 pytest==8.3.3 ruff==0.6.9
      - name: Lint
        run: ruff check src scripts tests
      - name: Unit and fixture integration tests
        run: pytest -q
      - name: Release package structural manifest
        run: python scripts/verify_release_package.py --repo-root . --out reports/release_package_manifest.json
      - name: Upload structural evidence
        uses: actions/upload-artifact@v4
        with:
          name: structural-evidence
          path: reports/release_package_manifest.json

  security-supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0 bandit==1.7.10 pip-audit==2.7.3
      - name: Secret scan
        run: detect-secrets scan --all-files --force-use-all-plugins > reports_detect_secrets.json
      - name: SAST
        run: bandit -q -r src scripts
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements-lock.txt
